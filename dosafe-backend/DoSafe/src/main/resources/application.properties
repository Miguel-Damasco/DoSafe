spring.application.name=DoSafe

# ${VAR:default} syntax: uses the env var if set, falls back to the default for local dev.
# In Docker, these are overridden via docker-compose environment section.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/dosafe?serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:area51}

# validate: Hibernate checks that the schema matches the entities but never modifies it.
# Flyway is now responsible for all schema changes.
spring.jpa.hibernate.ddl-auto=validate


jwt.secret=${JWT_SECRET:AtSK5NqyVDaitY/F1TO7UTeGbVdEjh6jJ2xKOaPxxXI=}

aws.s3.bucket=${AWS_S3_BUCKET}

aws.region=${AWS_REGION}

aws.sqs.document-text-extracted-queue-url=${AWS_SQS_QUEUE_URL:https://sqs.us-east-2.amazonaws.com/565393042861/document-text-extracted-queue}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# AWS SES — verified sender address (must be verified in AWS SES console)
aws.ses.sender-email=${AWS_SES_SENDER_EMAIL}

# Alert — how many days before expiration to trigger a notification email
alert.expiration-threshold-days=30

# Presigned URL — how long a download link is valid after being generated.
# Keep this short: the URL is returned in the API response and valid for one session.
document.download-url.ttl-minutes=15

# Rate limiting — upload endpoint
# Max documents a single user can upload per calendar day (UTC).
ratelimit.upload.per-user-daily=3
# Max documents all users combined can upload per calendar day (UTC).
ratelimit.upload.global-daily=10

# ── Actuator ──────────────────────────────────────────────────────────────────
# Expose only what's useful — health and info are public (load balancers, uptime monitors).
# Metrics, loggers and prometheus require authentication (configured in SecurityConfig).
management.endpoints.web.exposure.include=health,info,metrics,loggers,prometheus
# Show full health details only to authenticated users, not anonymous callers.
management.endpoint.health.show-details=when-authorized
# App metadata shown at /actuator/info
info.app.name=DoSafe
info.app.description=Identity document management with AWS Textract OCR
info.app.version=@project.version@
info.app.java=17

# Base URL of the backend — used for internal references.
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Base URL of the frontend — used to build clickable links sent in emails.
# Override in production (e.g. https://dosafe.com).
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Flyway — explicit logging to diagnose migration issues
spring.flyway.enabled=true
logging.level.org.flywaydb=INFO
